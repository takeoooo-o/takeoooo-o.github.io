<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>たけおの自己紹介</title>
  <!-- ルートCSS -->
  <link rel="stylesheet" href="../style.css">
  <style>
    
    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin: 20px auto;
      display: block;
      border: 3px solid #333;
    }

    .social-links a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    .social-links a:hover {
      color: #0077ff;
    }

    .intro p {
      font-size: 1.1rem;
      line-height: 1.6;
      max-width: 600px;
      margin: 10px auto;
    }
  </style>
</head>
<body>
  <header>
    <h1>たけおの部屋</h1>
    <nav>
      <a href="https://takeoooo-o.github.io">Home</a>
      <a href="https://takeoooo-o.github.io/あばうと/">About</a>
    </nav>
  </header>

  <main>
    <section class="intro">
      <img src="../profile.jpg" alt="たけおのプロフィール写真" class="profile-img">
      <h2>自己紹介</h2>
      <p>こんにちは。たけおです。最近YouTubeを始めました。ゲーム動画を中心に投稿しています!</p>
      <p>趣味はプログラミング、ゲーム、動画編集。SNS頑張ります</p>

      <div class="social-links" style="text-align:center; margin-top:20px;">
        <a href="https://www.youtube.com/@takeooo-o" target="_blank">YouTube</a>
        <style>
  .social-links {
    display: flex;
    justify-content: center;
    gap: 15px; 
    margin-top: 20px;
    flex-wrap: wrap; 
  }
  .btn {
    padding: 10px 20px;
    color: white;
    font-weight: bold;
    text-decoration: none;
    border-radius: 8px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  .btn-youtube {
    background-color: #FF0000;
  }
      </div>
    </section>
  </main>
</body>
</html>
